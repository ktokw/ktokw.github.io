<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 시대 생존 테스트</title>
  <meta name="description" content="당신은 AI 시대에서 살아남을 수 있을까요? 16가지 생존 유형 중 당신은 어디에 속할까요.">
  <meta property="og:title" content="AI 시대 생존 테스트">
  <meta property="og:description" content="팀장은 AI 쓰라고 하는데, 나는 아직도 구글링 중. AI 시대 나의 생존 전략은?">
  <meta property="og:type" content="website">
  <meta property="og:image" content="og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="AI 시대 생존 테스트">
  <meta name="twitter:description" content="16가지 AI 시대 생존 유형 중 나는? 3분이면 결과가 나와요.">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0F172A;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --accent: #6366F1;
      --accent-hover: #4F46E5;
      --secondary: #22D3EE;
      --card: #1E293B;
      --card-border: #334155;
      --gumroad: #10B981;
      --gumroad-hover: #059669;
      --selected-border: #6366F1;
      --selected-bg: rgba(99, 102, 241, 0.15);
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 24px 0 40px;
    }

    /* ──── INTRO ──── */
    .intro { text-align: center; }

    .intro-badge {
      display: inline-block;
      background: rgba(99, 102, 241, 0.2);
      border: 1px solid rgba(99, 102, 241, 0.4);
      color: #A5B4FC;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    .intro-emoji {
      font-size: 56px;
      margin-bottom: 16px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .intro-hook {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .intro-title {
      font-size: 30px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .intro-subtitle {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .intro-meta {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .intro-meta span {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .intro-meta span::before {
      content: '✓';
      color: var(--secondary);
      font-weight: 700;
    }

    .intro-social {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 16px;
    }

    /* ──── BUTTONS ──── */
    .btn {
      display: block;
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      text-decoration: none;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: var(--card);
      color: var(--text-muted);
      border: 1px solid var(--card-border);
    }

    .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

    .btn-gumroad {
      background: var(--gumroad);
      color: white;
    }

    .btn-gumroad:hover { background: var(--gumroad-hover); transform: translateY(-1px); }

    /* ──── PROGRESS ──── */
    .progress-wrapper {
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 16px 0 12px;
      z-index: 10;
      margin-bottom: 8px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .progress-count {
      font-size: 13px;
      font-weight: 600;
      color: var(--secondary);
    }

    .progress-bar-bg {
      height: 6px;
      background: var(--card);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--secondary));
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* ──── QUESTION ──── */
    .question-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 28px 24px;
      margin: 16px 0 24px;
    }

    .question-axis {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .question-text {
      font-size: 19px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text);
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-card {
      background: var(--card);
      border: 2px solid var(--card-border);
      border-radius: 12px;
      padding: 18px 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .option-card:hover {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.08);
    }

    .option-card:active { transform: scale(0.98); }

    .option-card.selected {
      border-color: var(--selected-border);
      background: var(--selected-bg);
    }

    .option-label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
      margin-top: 1px;
    }

    .option-card.selected .option-label {
      background: var(--accent);
      color: white;
    }

    .option-text {
      font-size: 15px;
      line-height: 1.55;
      color: var(--text);
    }

    /* ──── TOAST ──── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1E3A5F;
      border: 1px solid #3B82F6;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 100;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ──── LOADING ──── */
    .loading { text-align: center; padding: 60px 0; }

    .loading-icon {
      font-size: 64px;
      display: block;
      margin-bottom: 32px;
      animation: spin-slow 2s linear infinite;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .loading-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .loading-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
      min-height: 20px;
      transition: opacity 0.3s;
    }

    .loading-bar-bg {
      height: 8px;
      background: var(--card);
      border-radius: 4px;
      overflow: hidden;
      margin: 0 auto;
      max-width: 280px;
    }

    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--secondary));
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .loading-pct {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 12px;
    }

    /* ──── RESULT ──── */
    .result-header { text-align: center; margin-bottom: 24px; }

    .result-header p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .result-card {
      background: linear-gradient(135deg, #1E293B 0%, #162032 100%);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 36px 28px;
      text-align: center;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .result-emoji {
      font-size: 52px;
      display: block;
      margin-bottom: 8px;
    }

    .result-code {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }

    .result-name {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .result-tagline {
      font-size: 15px;
      color: var(--secondary);
      font-style: italic;
      margin-bottom: 20px;
    }

    .result-desc {
      font-size: 15px;
      line-height: 1.75;
      color: #CBD5E1;
      text-align: left;
    }

    .result-traits {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
      justify-content: center;
    }

    .trait-tag {
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: #A5B4FC;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .result-advice {
      background: rgba(34, 211, 238, 0.08);
      border-left: 3px solid var(--secondary);
      padding: 14px 16px;
      border-radius: 0 8px 8px 0;
      margin: 20px 0;
    }

    .result-advice-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--secondary);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .result-advice-text {
      font-size: 14px;
      line-height: 1.6;
      color: #CBD5E1;
    }

    .share-hint {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--card-border);
      margin: 28px 0;
    }

    .gumroad-section { text-align: center; }

    .gumroad-label {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .gumroad-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .gumroad-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .gumroad-note {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ──── ANIMATIONS ──── */
    .fade-in {
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .slide-in {
      animation: slideIn 0.35s ease forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>

    // ───── SCORING ─────

    function calcResult(answers) {
      // axis1: q0-q4 (P vs V), axis2: q5-q9 (D vs U), axis3: q10-q14 (O vs G), axis4: q15-q19 (S vs I)
      const ranges = [[0,5],[5,10],[10,15],[15,20]];
      const codes = [];
      const poleA = ['P','D','O','S'];
      const poleB = ['V','U','G','I'];
      const tieDefault = [0,1,0,1]; // axis1→P(0=poleA), axis2→U(1=poleB), axis3→O(0=poleA), axis4→I(1=poleB)

      ranges.forEach(([start, end], i) => {
        const slice = answers.slice(start, end);
        const aCount = slice.filter(a => a === 'A').length;
        if (aCount >= 3) codes.push(poleA[i]);
        else if ((5 - aCount) >= 3) codes.push(poleB[i]);
        else codes.push(tieDefault[i] === 0 ? poleA[i] : poleB[i]);
      });

      return codes.join('');
    }

      const el = document.getElementById('toast');

      state.toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

            <span class="option-text">${q.a.text}</span>
          </div>
          <div class="option-card" data-choice="B">
            <span class="option-label">B</span>
            <span class="option-text">${q.b.text}</span>
          </div>
        </div>
      </div>`;
    }

    function renderLoading() {
      return `<div class="loading fade-in" id="loading-screen">
        <span class="loading-icon">🔮</span>
        <h2 class="loading-title">당신의 AI 생존 유형을<br>분석하고 있어요...</h2>
        <p class="loading-sub" id="loading-msg">AI 친화도 측정 중...</p>
        <div class="loading-bar-bg">
          <div class="loading-bar-fill" id="loading-bar" style="width:0%"></div>
        </div>
        <p class="loading-pct" id="loading-pct">0%</p>
      </div>`;
    }

    function renderResult() {
      const code = state.result;
      const t = TYPES[code];
      if (!t) return `<div class="fade-in"><p>알 수 없는 유형입니다.</p></div>`;

      const shareUrl = `${location.origin}${location.pathname}?result=${code}`;
      const shareText = `나는 ${t.name} ${t.emoji}\n"${t.tagline}"\nAI 시대 생존 테스트에서 너는 뭐가 나와?\n→ ${shareUrl}`;

      return `<div class="fade-in">
        <div class="result-header">
          <p>당신의 AI 시대 생존 유형은</p>
        </div>
        <div class="result-card">
          <span class="result-emoji">${t.emoji}</span>
          <div class="result-code">${code}</div>
          <div class="result-name">${t.name}</div>
          <div class="result-tagline">"${t.tagline}"</div>
          <p class="result-desc">${t.desc}</p>
          <div class="result-traits">
            ${t.traits.map(tr => `<span class="trait-tag">${tr}</span>`).join('')}
          </div>
        </div>
        <div class="result-advice">
          <div class="result-advice-label">💡 당신에게 필요한 것</div>
          <div class="result-advice-text">${t.advice}</div>
        </div>
        <p class="share-hint">이 유형, 친구는 어떻게 나올까요?</p>
        <div class="btn-group">
          <button class="btn btn-primary" id="share-btn" data-url="${shareUrl}" data-text="${encodeURIComponent(shareText)}">📤 내 유형 공유하기</button>
          <button class="btn btn-secondary" id="retry-btn">🔁 다시 테스트하기</button>
        </div>
        <hr class="divider">
        <div class="gumroad-section">
          <p class="gumroad-label">더 알고 싶다면?</p>
          <p class="gumroad-title">AI 생존 가이드 살펴보기</p>
          <p class="gumroad-desc">유형별 맞춤 전략 · 실전 도구 추천 · 커리어 로드맵<br>지금 바로 확인해보세요.</p>
          <a href="https://3808051897635.gumroad.com/l/vjbjo" target="_blank" rel="noopener" class="btn btn-gumroad">📘 가이드 보기 →</a>
          <p class="gumroad-note">무료 미리보기 있음</p>
        </div>
      </div>`;
    }

    // ───── LOADING ANIMATION ─────

    function startLoading() {
      const result = calcResult(state.answers);
      let pct = 0;
      let msgIdx = 0;
      const bar = document.getElementById('loading-bar');
      const pctEl = document.getElementById('loading-pct');
      const msgEl = document.getElementById('loading-msg');

      const msgInterval = setInterval(() => {
        msgIdx = (msgIdx + 1) % LOADING_MSGS.length;
        if (msgEl) msgEl.textContent = LOADING_MSGS[msgIdx];
      }, 600);

      const tick = setInterval(() => {
        pct += Math.random() * 18 + 5;
        if (pct >= 100) {
          pct = 100;
          clearInterval(tick);
          clearInterval(msgInterval);
          if (bar) bar.style.width = '100%';
          if (pctEl) pctEl.textContent = '100%';
          setTimeout(() => {
            state.result = result;
            state.screen = 'result';
            render();
          }, 300);
        }
        if (bar) bar.style.width = Math.min(pct, 100) + '%';
        if (pctEl) pctEl.textContent = Math.floor(Math.min(pct, 100)) + '%';
      }, 200);
    }

    // ───── EVENTS ─────

    function bindEvents() {
      document.getElementById('start-btn')?.addEventListener('click', () => {
        state.screen = 'question';
        state.currentQ = 0;
        state.answers = [];
        render();
      });

      document.querySelectorAll('.option-card').forEach(card => {
        card.addEventListener('click', () => {
          const choice = card.getAttribute('data-choice');
          card.classList.add('selected');

          // toast at Q10
          if (state.currentQ === 9) {
            setTimeout(() => showToast('벌써 절반! 거의 다 왔어요 💪'), 200);
          }

          setTimeout(() => {
            state.answers[state.currentQ] = choice;
            state.currentQ++;
            if (state.currentQ >= QUESTIONS.length) {
              state.screen = 'loading';
            }
            render();
          }, 300);
        });
      });

      document.getElementById('share-btn')?.addEventListener('click', function() {
        const url = this.getAttribute('data-url');
        const text = decodeURIComponent(this.getAttribute('data-text'));
        if (navigator.share) {
          navigator.share({ title: 'AI 시대 생존 테스트', text, url })
            .catch(() => {});
        } else {
          navigator.clipboard.writeText(text).then(() => {
            showToast('링크가 클립보드에 복사됐어요! 📋');
          }).catch(() => {
            showToast('링크: ' + url);
          });
        }
      });

      document.getElementById('retry-btn')?.addEventListener('click', () => {
        state.screen = 'intro';
        state.answers = [];
        state.result = null;
        render();
      });
    }

    // ───── URL PARAMS ─────

    function checkUrlParams() {
      const params = new URLSearchParams(location.search);
      const result = params.get('result');
      if (result && TYPES[result.toUpperCase()]) {
        state.result = result.toUpperCase();
        state.screen = 'result';
      }
    }

    // ───── INIT ─────

    checkUrlParams();
    render();
  </script>
</body>
</html>
